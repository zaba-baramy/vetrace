name: school_bus_tracking
description: Modern school bus tracker with Realtime Database and simulated tracking
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  flutter_typeahead: ^5.2.0
  google_maps_webservice: ^0.0.20-nullsafety.5
  shared_preferences: ^2.3.5
  cupertino_icons: ^1.0.6

  # Firebase core
  firebase_core: ^3.3.0
  firebase_auth: ^5.7.0

  # Database + messaging
  firebase_database: ^11.3.10
  firebase_messaging: ^15.0.2

  # Maps + location
  google_maps_flutter: ^2.14.0
  location: ^7.0.0

  # State management
  provider: ^6.1.2

  # UI & utils
  intl: ^0.20.2
  flutter_spinkit: ^5.2.1
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/bus_marker.png
    - assets/images/house.png
    - assets/images/appicon.png
    - .env



